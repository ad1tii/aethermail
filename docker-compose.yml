services:
  aethermail:
    build:
      context: .
    ports:
      - "8080:80"

  aethermail-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - aethermail_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5174"
    ports:
      - "5174:5174"

volumes:
  aethermail_node_modules:
